<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rassegna — European Press Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #1a1a1a;
      --ink-light: #444;
      --rule:      #c8b99a;
      --paper:     #faf8f4;
      --card:      #fff;
      --accent:    #b5341c;
      --accent-bg: #fdf0ee;
      --tag-bg:    #f0ece4;
      --shadow:    0 1px 4px rgba(0,0,0,.08);
      --radius:    4px;
      --serif:     'Georgia', 'Times New Roman', serif;
      --sans:      'Helvetica Neue', Arial, sans-serif;
      --max:       860px;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.65;
      min-height: 100vh;
    }

    /* ── Masthead ── */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding: 28px 24px 18px;
      text-align: center;
      max-width: var(--max);
      margin: 0 auto;
    }

    .masthead-label {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 6px;
    }

    .masthead h1 {
      font-size: clamp(2.8rem, 8vw, 4.8rem);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1;
      font-style: italic;
    }

    .masthead-tagline {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-top: 8px;
    }

    /* ── Date / nav bar ── */
    .datebar {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 24px;
      border-bottom: 1px solid var(--rule);
      font-family: var(--sans);
      font-size: 12px;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      color: var(--ink);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 4px 10px;
      transition: background .12s, border-color .12s;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--tag-bg);
      border-color: var(--ink-light);
    }
    .nav-btn:disabled {
      color: #bbb;
      border-color: #e0d8cc;
      cursor: default;
    }

    .date-select {
      flex: 1;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 4px 8px;
      cursor: pointer;
      appearance: auto;
    }
    .date-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    .datebar .article-count {
      color: var(--ink-light);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Archive strip (shown when > 1 edition) ── */
    .archive-bar {
      max-width: var(--max);
      margin: 0 auto;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--rule);
      background: var(--tag-bg);
    }
    .archive-bar.visible { display: flex; }

    .archive-bar-label {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-light);
      align-self: center;
      margin-right: 4px;
    }

    .archive-chip {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-light);
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 20px;
      padding: 3px 10px;
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
      white-space: nowrap;
    }
    .archive-chip:hover { background: var(--tag-bg); border-color: var(--ink-light); }
    .archive-chip.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* ── Main content ── */
    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .section-heading::before,
    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .section-heading span {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ink-light);
      white-space: nowrap;
    }

    /* ── Article cards ── */
    .articles { display: grid; gap: 20px; }

    .card {
      background: var(--card);
      border: 1px solid #e6e0d4;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 28px;
      transition: box-shadow .15s;
    }
    .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.12); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .source-badge {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: var(--ink);
      color: #fff;
      padding: 2px 8px;
      border-radius: 2px;
    }

    .topic-tag {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: var(--tag-bg);
      color: var(--accent);
      border: 1px solid var(--rule);
      padding: 2px 8px;
      border-radius: 2px;
    }

    .card h2 {
      font-size: 1.18rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
    }
    .card h2 a {
      color: inherit;
      text-decoration: none;
    }
    .card h2 a:hover {
      text-decoration: underline;
      text-decoration-color: var(--accent);
    }

    .card p {
      font-size: .96rem;
      color: var(--ink-light);
      line-height: 1.7;
    }

    /* ── States ── */
    .state-msg {
      text-align: center;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--ink-light);
      padding: 64px 0;
    }
    .state-msg.error { color: var(--accent); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--rule);
      max-width: var(--max);
      margin: 0 auto;
      padding: 20px 24px;
      font-family: var(--sans);
      font-size: 11px;
      color: var(--ink-light);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* ── Responsive ── */
    @media (max-width: 540px) {
      .masthead { padding: 20px 16px 14px; }
      main { padding: 24px 16px 48px; }
      .card { padding: 18px 20px; }
      .datebar { padding: 8px 16px; }
      .archive-bar { padding: 10px 16px; }
      footer { padding: 16px; }
    }
  </style>
</head>
<body>

  <header class="masthead">
    <p class="masthead-label">AI-Curated Press Review</p>
    <h1>Rassegna</h1>
    <p class="masthead-tagline">European Affairs &amp; International Politics</p>
  </header>

  <div class="datebar">
    <button class="nav-btn" id="btn-prev" title="Older edition" disabled>&#8592;</button>
    <select class="date-select" id="date-select" aria-label="Select edition"></select>
    <button class="nav-btn" id="btn-next" title="Newer edition" disabled>&#8594;</button>
    <span class="article-count" id="article-count"></span>
  </div>

  <div class="archive-bar" id="archive-bar">
    <span class="archive-bar-label">Archive</span>
  </div>

  <main>
    <div class="section-heading"><span id="section-label">Today&rsquo;s Digest</span></div>
    <div class="articles" id="articles">
      <div class="state-msg" id="loading-msg">Fetching today&rsquo;s articles&hellip;</div>
    </div>
  </main>

  <footer>
    <span>Rassegna &mdash; Summaries are AI-generated. Always verify with the original source.</span>
    <span id="footer-date"></span>
  </footer>

  <script>
    const INDEX_URL = 'data/index.json';

    let dates = [];   // newest-first array of "YYYY-MM-DD" strings
    let current = 0; // index into dates[]

    function formatDate(isoStr) {
      const [y, m, d] = isoStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-GB', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function updateNav() {
      document.getElementById('btn-prev').disabled = current >= dates.length - 1;
      document.getElementById('btn-next').disabled = current <= 0;
      document.getElementById('date-select').value = dates[current];

      // Archive chips
      document.querySelectorAll('.archive-chip').forEach((chip, i) => {
        chip.classList.toggle('active', i === current);
      });

      // Section label: "Today's Digest" only for the newest date
      const label = current === 0 ? 'Today’s Digest' : 'Edition — ' + formatDate(dates[current]);
      document.getElementById('section-label').textContent = label;
    }

    function renderArticles(data) {
      const container = document.getElementById('articles');
      const countEl   = document.getElementById('article-count');
      const footerEl  = document.getElementById('footer-date');

      footerEl.textContent = formatDate(data.date);

      const n = data.articles.length;
      countEl.textContent = n === 1 ? '1 article' : `${n} articles`;

      if (!n) {
        container.innerHTML = '<div class="state-msg">No articles for this edition.</div>';
        return;
      }

      container.innerHTML = data.articles.map(art => `
        <article class="card">
          <div class="card-meta">
            <span class="source-badge">${escapeHtml(art.source)}</span>
            <span class="topic-tag">${escapeHtml(art.topic)}</span>
          </div>
          <h2><a href="${escapeHtml(art.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(art.title)}</a></h2>
          <p>${escapeHtml(art.summary)}</p>
        </article>
      `).join('');
    }

    async function loadEdition(idx) {
      current = idx;
      updateNav();

      const container = document.getElementById('articles');
      container.innerHTML = '<div class="state-msg">Loading&hellip;</div>';

      try {
        const res = await fetch(`data/${dates[idx]}.json?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        renderArticles(await res.json());
      } catch (err) {
        console.error('Rassegna load error:', err);
        container.innerHTML =
          '<div class="state-msg error">Could not load this edition. Please try again later.</div>';
      }
    }

    function buildArchiveBar() {
      const bar = document.getElementById('archive-bar');
      if (dates.length <= 1) return; // hide if only one edition
      bar.classList.add('visible');

      dates.forEach((d, i) => {
        const chip = document.createElement('button');
        chip.className = 'archive-chip' + (i === 0 ? ' active' : '');
        chip.textContent = d;
        chip.addEventListener('click', () => loadEdition(i));
        bar.appendChild(chip);
      });
    }

    function buildSelect() {
      const sel = document.getElementById('date-select');
      dates.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = formatDate(d);
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => {
        loadEdition(dates.indexOf(sel.value));
      });
    }

    async function init() {
      try {
        const res = await fetch(INDEX_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        dates = await res.json();
        if (!dates.length) throw new Error('Empty index');
      } catch (err) {
        console.error('Rassegna index error:', err);
        document.getElementById('loading-msg')?.remove();
        document.getElementById('articles').innerHTML =
          '<div class="state-msg error">Could not load the edition index. Please try again later.</div>';
        document.getElementById('date-select').disabled = true;
        return;
      }

      buildSelect();
      buildArchiveBar();

      document.getElementById('btn-prev').addEventListener('click', () => loadEdition(current + 1));
      document.getElementById('btn-next').addEventListener('click', () => loadEdition(current - 1));

      loadEdition(0); // load newest
    }

    init();
  </script>
</body>
</html>
