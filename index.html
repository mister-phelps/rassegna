<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rassegna — Daily Briefing</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1a1a1a;
      --ink-mid:    #555;
      --ink-light:  #888;
      --rule:       #d4c9b4;
      --rule-light: #e8e2d8;
      --paper:      #faf8f4;
      --sidebar-bg: #f3f0ea;
      --card:       #fff;
      --accent:     #b5341c;
      --serif:      'Georgia', 'Times New Roman', serif;
      --sans:       'Helvetica Neue', Arial, sans-serif;
      --sidebar-w:  200px;
      --max:        1060px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ─── Masthead ─────────────────────────────────── */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding: 26px 32px 16px;
      text-align: center;
      max-width: var(--max);
      margin: 0 auto;
    }
    .masthead-eyebrow {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 4px;
    }
    .masthead h1 {
      font-size: clamp(2.6rem, 7vw, 4.4rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: -.02em;
      line-height: 1;
    }
    .masthead-sub {
      font-family: var(--sans);
      font-size: 10.5px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-top: 7px;
    }

    /* ─── Layout shell ──────────────────────────────── */
    .shell {
      max-width: var(--max);
      margin: 0 auto;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-rows: auto 1fr;
      min-height: calc(100vh - 120px);
    }

    /* ─── Sidebar ───────────────────────────────────── */
    .sidebar {
      grid-column: 1;
      grid-row: 1 / -1;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--rule);
      padding: 24px 0 48px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-label {
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink-light);
      padding: 0 18px 10px;
      border-bottom: 1px solid var(--rule-light);
      margin-bottom: 8px;
    }

    .date-list {
      list-style: none;
    }
    .date-list li button {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 8px 18px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 12px;
      color: var(--ink-mid);
      line-height: 1.3;
      transition: background .1s, color .1s;
      border-left: 2px solid transparent;
    }
    .date-list li button:hover {
      background: var(--rule-light);
      color: var(--ink);
    }
    .date-list li button.active {
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 700;
      background: rgba(181,52,28,.05);
    }
    .date-list li button .weekday {
      display: block;
      font-size: 9px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink-light);
      font-weight: 400;
      margin-bottom: 1px;
    }
    .date-list li button.active .weekday { color: var(--accent); opacity: .7; }

    /* ─── Main content ──────────────────────────────── */
    .content-wrap {
      grid-column: 2;
      padding: 36px 44px 72px;
      min-width: 0; /* prevent grid blowout */
    }

    /* Loading / error */
    .state-msg {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--ink-light);
      padding: 48px 0;
      text-align: center;
    }
    .state-msg.error { color: var(--accent); }

    /* ─── Rendered markdown styles ──────────────────── */
    .briefing-body h1 {
      /* The top-level heading is used as the page title — hidden in the body,
         already extracted and shown in masthead area */
      display: none;
    }

    .briefing-body h2 {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .01em;
      text-transform: uppercase;
      color: var(--ink);
      margin: 40px 0 18px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .briefing-body h2:first-of-type { margin-top: 0; }
    .briefing-body h2::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 1.1em;
      background: var(--accent);
      border-radius: 1px;
      flex-shrink: 0;
    }

    .briefing-body h3 {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin: 28px 0 10px;
    }

    /* Story entries: bold headline + following paragraph */
    .briefing-body p {
      margin-bottom: 18px;
      font-size: 1rem;
      line-height: 1.75;
      color: var(--ink);
    }
    .briefing-body p strong:first-child {
      display: block;
      font-size: 1.08rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 4px;
    }

    /* "Also noted" bullets */
    .briefing-body ul {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
      display: grid;
      gap: 8px;
    }
    .briefing-body ul li {
      font-size: .92rem;
      color: var(--ink-mid);
      line-height: 1.55;
      padding-left: 16px;
      position: relative;
    }
    .briefing-body ul li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--rule);
    }

    /* Links */
    .briefing-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(181,52,28,.25);
      transition: border-color .12s;
    }
    .briefing-body a:hover { border-bottom-color: var(--accent); }

    /* Edition date shown above content */
    .edition-header {
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--ink);
    }
    .edition-header .edition-kicker {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 4px;
    }
    .edition-header h2 {
      font-family: var(--serif);
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 700;
      font-style: italic;
      line-height: 1.2;
      border: none;
      padding: 0;
      margin: 0;
      text-transform: none;
      letter-spacing: 0;
      display: block;
      color: var(--ink);
    }
    .edition-header h2::before { display: none; }

    /* ─── Footer ────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--rule);
      max-width: var(--max);
      margin: 0 auto;
      width: 100%;
      padding: 16px 32px;
      font-family: var(--sans);
      font-size: 11px;
      color: var(--ink-light);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ─── Mobile ────────────────────────────────────── */
    @media (max-width: 680px) {
      :root { --sidebar-w: 100%; }

      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--rule);
        padding: 12px 0;
        overflow-x: auto;
        overflow-y: visible;
        display: flex;
        align-items: center;
        gap: 0;
      }
      .sidebar-label { display: none; }
      .date-list {
        display: flex;
        flex-direction: row;
        padding: 0 12px;
      }
      .date-list li button {
        white-space: nowrap;
        border-left: none;
        border-bottom: 2px solid transparent;
        padding: 6px 12px;
      }
      .date-list li button.active {
        border-left-color: transparent;
        border-bottom-color: var(--accent);
      }
      .date-list li button .weekday { display: none; }

      .content-wrap {
        padding: 24px 20px 48px;
      }

      footer { padding: 14px 20px; }
      .masthead { padding: 20px 20px 14px; }
    }
  </style>
</head>
<body>

  <header class="masthead">
    <p class="masthead-eyebrow">Daily Briefing</p>
    <h1>Rassegna</h1>
    <p class="masthead-sub">European Affairs &amp; International Politics</p>
  </header>

  <div class="shell">
    <nav class="sidebar" aria-label="Edition archive">
      <p class="sidebar-label">Archive</p>
      <ul class="date-list" id="date-list">
        <!-- populated by JS -->
      </ul>
    </nav>

    <div class="content-wrap">
      <div id="edition-header" class="edition-header" style="display:none">
        <p class="edition-kicker">Daily Briefing</p>
        <h2 id="edition-title"></h2>
      </div>
      <div id="content">
        <div class="state-msg">Loading briefing&hellip;</div>
      </div>
    </div>

  </div>

  <footer>
    <span>Rassegna &mdash; AI-generated summaries. Always verify with the original source.</span>
    <span id="footer-date"></span>
  </footer>

  <script>
    // Configure marked
    marked.use({ gfm: true, breaks: false });

    const INDEX = 'data/index.json';
    let dates = [];
    let currentIdx = 0;

    // ── Helpers ────────────────────────────────────────────────────
    function parseDate(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function fmtShort(iso) {
      return parseDate(iso).toLocaleDateString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric'
      });
    }

    function fmtWeekday(iso) {
      return parseDate(iso).toLocaleDateString('en-GB', { weekday: 'long' });
    }

    function extractTitle(md) {
      const m = md.match(/^#\s+Daily Briefing\s+[—–-]+\s+(.+)/m);
      return m ? m[1].trim() : null;
    }

    // ── Sidebar ────────────────────────────────────────────────────
    function buildSidebar() {
      const list = document.getElementById('date-list');
      list.innerHTML = '';
      dates.forEach((iso, i) => {
        const li  = document.createElement('li');
        const btn = document.createElement('button');
        btn.innerHTML = `<span class="weekday">${fmtWeekday(iso)}</span>${fmtShort(iso)}`;
        btn.addEventListener('click', () => loadBriefing(i));
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    function updateSidebar(idx) {
      document.querySelectorAll('.date-list li button').forEach((btn, i) => {
        btn.classList.toggle('active', i === idx);
      });
    }

    // ── Load & render ──────────────────────────────────────────────
    async function loadBriefing(idx) {
      currentIdx = idx;
      updateSidebar(idx);

      const contentEl = document.getElementById('content');
      contentEl.innerHTML = '<div class="state-msg">Loading&hellip;</div>';
      document.getElementById('edition-header').style.display = 'none';

      try {
        const res = await fetch(`data/briefings/${dates[idx]}.md?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();

        // Extract and show title
        const title = extractTitle(md);
        const headerEl = document.getElementById('edition-header');
        const titleEl  = document.getElementById('edition-title');
        if (title) {
          titleEl.textContent = title;
          headerEl.style.display = '';
        }

        // Render body (h1 is hidden via CSS); patch all links to open in new tab
        const div = document.createElement('div');
        div.className = 'briefing-body';
        div.innerHTML = marked.parse(md).replace(/<a href=/g, '<a target="_blank" rel="noopener noreferrer" href=');
        contentEl.innerHTML = '';
        contentEl.appendChild(div);

        // Footer date
        document.getElementById('footer-date').textContent =
          title ?? fmtShort(dates[idx]);

        // Scroll content to top on edition change
        document.querySelector('.content-wrap').scrollTop = 0;

      } catch (err) {
        console.error(err);
        contentEl.innerHTML =
          '<div class="state-msg error">Could not load this briefing. Please try again later.</div>';
      }
    }

    // ── Boot ───────────────────────────────────────────────────────
    async function init() {
      try {
        const res = await fetch(INDEX + '?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        dates = await res.json();
        if (!dates.length) throw new Error('Empty index');
      } catch (err) {
        console.error(err);
        document.getElementById('content').innerHTML =
          '<div class="state-msg error">Could not load the briefing archive. Please try again later.</div>';
        return;
      }

      buildSidebar();
      loadBriefing(0);
    }

    init();
  </script>
</body>
</html>
